<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyNotes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:#1c1917;color:#e7e5e0;display:flex;flex-direction:column;flex-shrink:0;min-height:100vh;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:50}
.sidebar-logo{padding:20px 16px 12px;border-bottom:1px solid #292524}
.sidebar-logo h1{font-size:18px;font-weight:700;color:#fef9ee;letter-spacing:-0.3px}
.sidebar-logo span{font-size:12px;color:#78716c;margin-top:2px;display:block}
.sidebar-nav{padding:12px 8px;border-bottom:1px solid #292524}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13.5px;color:#a8a29e;transition:all 0.15s;margin-bottom:2px}
.nav-item:hover{background:#292524;color:#e7e5e0}
.nav-item.active{background:#78350f;color:#fef9ee}
.sidebar-books{padding:8px}
.sidebar-section-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#57534e;padding:4px 10px 6px}
.book-nav-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:#a8a29e;transition:all 0.15s;margin-bottom:1px}
.book-nav-item:hover{background:#292524;color:#e7e5e0}
.book-nav-item.active{background:#292524;color:#e7e5e0;font-weight:500}
.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:48px;background:#fff;border-bottom:1px solid #e7e5e0;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:10}
.topbar-title{font-size:14px;font-weight:600;color:#1a1a1a;flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #e2e0db;background:#fff;color:#44403c;transition:all 0.15s}
.btn:hover{background:#f5f4f1;border-color:#c9c6c1}
.btn-primary{background:#78350f;color:#fff;border-color:#78350f}
.btn-primary:hover{background:#6b2f0e}
.btn-sm{padding:4px 9px;font-size:12px}
.content{flex:1;padding:24px;overflow-y:auto}
.home-welcome{max-width:600px;margin:0 auto;text-align:center;padding:60px 20px}
.home-welcome h2{font-size:28px;font-weight:700;color:#1c1917;margin-bottom:10px}
.home-welcome p{font-size:15px;color:#78716c;line-height:1.6;margin-bottom:32px}
.stats-row{display:flex;gap:16px;justify-content:center;margin-bottom:32px}
.stat-card{background:#fff;border:1px solid #e7e5e0;border-radius:10px;padding:16px 24px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:#78350f}
.stat-card .lbl{font-size:12px;color:#78716c;margin-top:2px}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;padding:4px}
.book-card{background:#fff;border:1px solid #e7e5e0;border-radius:12px;padding:20px 16px;cursor:pointer;transition:all 0.2s;position:relative}
.book-card:hover{border-color:#c9c6c1;box-shadow:0 2px 8px rgba(0,0,0,0.06);transform:translateY(-1px)}
.book-card .book-dp{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px}
.book-card .book-name{font-size:14px;font-weight:600;color:#1c1917;margin-bottom:4px}
.book-card .book-count{font-size:12px;color:#9ca3af}
.book-card .book-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
.book-card:hover .book-actions{opacity:1}
.icon-btn{width:26px;height:26px;border-radius:5px;border:1px solid #e7e5e0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#6b7280;transition:all 0.15s}
.icon-btn:hover{background:#f9fafb}
.icon-btn.danger:hover{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
.add-book-card{background:#fafaf8;border:1.5px dashed #d4d0cc;border-radius:12px;padding:20px 16px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;gap:8px;color:#9ca3af}
.add-book-card:hover{border-color:#a8a29e;color:#6b7280}
.add-book-card span{font-size:12px;font-weight:500}
.notes-layout{display:flex;height:calc(100vh - 48px);overflow:hidden}
.notes-tree{width:260px;background:#fff;border-right:1px solid #e7e5e0;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.notes-tree-header{padding:12px 14px;border-bottom:1px solid #f0ede8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.notes-tree-header span{font-size:13px;font-weight:600;color:#44403c}
.notes-tree-body{flex:1;overflow-y:auto}
.note-editor{flex:1;overflow:hidden;display:flex;flex-direction:column}
.editor-inner{flex:1;padding:28px 32px;overflow-y:auto}
.note-title-input{font-size:24px;font-weight:700;border:none;outline:none;background:transparent;color:#1c1917;width:100%;margin-bottom:6px;line-height:1.3}
.note-title-input::placeholder{color:#c7c2bb}
.note-meta{font-size:12px;color:#9ca3af;margin-bottom:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0ede8;padding-bottom:14px}
.note-body-input{font-size:15px;line-height:1.8;border:none;outline:none;background:transparent;color:#374151;width:100%;resize:none;font-family:inherit;min-height:400px}
.note-body-input::placeholder{color:#d4d0cc}
.tree-node{user-select:none}
.tree-node-row{display:flex;align-items:center;gap:4px;padding:5px 8px 5px 0;cursor:pointer;transition:background 0.1s;position:relative}
.tree-node-row:hover{background:#f8f7f4}
.tree-node-row.active{background:#fef9ee}
.tree-node-row .toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#9ca3af;flex-shrink:0;border-radius:3px}
.tree-node-row .note-icon{font-size:13px;flex-shrink:0;color:#c7c2bb}
.tree-node-row.active .note-icon{color:#78350f}
.tree-node-row .note-label{font-size:13px;color:#374151;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:4px}
.tree-node-row.active .note-label{color:#1c1917;font-weight:500}
.tree-node-row .node-actions{display:flex;gap:2px;opacity:0;flex-shrink:0}
.tree-node-row:hover .node-actions{opacity:1}
.node-btn{font-size:11px;color:#9ca3af;padding:2px 4px;border-radius:3px;border:none;background:transparent;cursor:pointer;line-height:1}
.node-btn:hover{color:#78350f;background:#fef9ee}
.node-btn.del:hover{color:#ef4444;background:#fee2e2}
.tree-children{border-left:1.5px solid #f0ede8;margin-left:16px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:14px;padding:24px;width:400px;max-width:92vw;box-shadow:0 12px 40px rgba(0,0,0,0.15)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#1c1917}
.modal label{font-size:12px;color:#78716c;display:block;margin-bottom:5px}
.modal input,.modal textarea{width:100%;padding:9px 12px;border:1px solid #e2e0db;border-radius:7px;font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;color:#1a1a1a}
.modal input:focus,.modal textarea:focus{border-color:#78350f;box-shadow:0 0 0 2px rgba(120,53,15,0.1)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.emoji-opt{width:36px;height:36px;border-radius:6px;border:1.5px solid #e2e0db;background:#f8f7f4;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.1s}
.emoji-opt:hover,.emoji-opt.selected{border-color:#78350f;background:#fef9ee}
.color-grid{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all 0.1s}
.color-opt.selected{border-color:#1c1917;transform:scale(1.18)}
.export-bar{padding:10px 16px;border-top:1px solid #f0ede8;display:flex;gap:8px;align-items:center;background:#fff;flex-shrink:0}
.export-bar .lbl{font-size:11px;color:#9ca3af;margin-right:2px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#c7c2bb;gap:10px;padding:40px}
.empty-state .es-icon{font-size:40px}
.empty-state p{font-size:14px;text-align:center;line-height:1.6}
.info-banner{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:20px;line-height:1.6}
.info-banner strong{font-weight:600}
@media(max-width:640px){
  .sidebar{width:200px}
  .main{margin-left:200px}
  .notes-tree{width:180px}
  .editor-inner{padding:16px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback,createElement:h,Fragment}=React;

const EMOJIS=["📓","📔","📒","📕","📗","📘","📙","🗒️","📋","📌","🏷️","💡","🔖","📐","🎯","🧠","💼","🌿","✨","🔥","⭐","🎨","🚀","💎","🧩","📊","🗂️","🎓","💻","🌐"];
const COLORS=["#fef3c7","#dbeafe","#dcfce7","#fce7f3","#ede9fe","#ffedd5","#cffafe","#f1f5f9","#fecdd3","#d1fae5","#fef9c3","#e0e7ff"];

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function countNotes(notes){
  let c=0;
  function walk(arr){if(!arr)return;arr.forEach(n=>{c++;walk(n.children);})}
  walk(notes);return c;
}

function flattenNotes(notes,path=[]){
  let flat=[];
  (notes||[]).forEach(n=>{
    flat.push({...n,_path:path,_level:path.length});
    if(n.children&&n.children.length)flat=[...flat,...flattenNotes(n.children,[...path,n.title||'Untitled'])];
  });
  return flat;
}

function findNote(notes,id){
  for(let n of (notes||[])){
    if(n.id===id)return n;
    const f=findNote(n.children,id);
    if(f)return f;
  }return null;
}

function updateNote(notes,id,updater){
  return (notes||[]).map(n=>{
    if(n.id===id)return updater(n);
    return{...n,children:updateNote(n.children,id,updater)};
  });
}

function deleteNoteById(notes,id){
  return (notes||[]).filter(n=>n.id!==id).map(n=>({...n,children:deleteNoteById(n.children,id)}));
}

function addChild(notes,parentId,newNote){
  return (notes||[]).map(n=>{
    if(n.id===parentId)return{...n,children:[...(n.children||[]),newNote]};
    return{...n,children:addChild(n.children,parentId,newNote)};
  });
}

/* ---- Storage: localStorage for public shared state ---- */
const STORE_KEY='mynotes_v2_books';
function loadBooks(){try{const s=localStorage.getItem(STORE_KEY);return s?JSON.parse(s):[];}catch{return[];}}
function saveBooks(b){try{localStorage.setItem(STORE_KEY,JSON.stringify(b));}catch{}}

/* ---- Tree Node ---- */
function TreeNode({note,depth,activeId,onSelect,onAddChild,onDelete}){
  const[open,setOpen]=useState(depth<2);
  const hasKids=note.children&&note.children.length>0;
  const isActive=note.id===activeId;
  return h('div',{className:'tree-node'},
    h('div',{
      className:'tree-node-row'+(isActive?' active':''),
      style:{paddingLeft:(8+depth*14)+'px'},
      onClick:()=>onSelect(note.id)
    },
      hasKids
        ?h('span',{className:'toggle',onClick:e=>{e.stopPropagation();setOpen(o=>!o)}},open?'▾':'▸')
        :h('span',{className:'toggle'},''),
      h('span',{className:'note-icon'},'◦'),
      h('span',{className:'note-label'},note.title||'Untitled'),
      h('span',{className:'node-actions'},
        h('button',{className:'node-btn',onClick:e=>{e.stopPropagation();onAddChild(note.id)},title:'Add child note'},'+'),
        h('button',{className:'node-btn del',onClick:e=>{e.stopPropagation();if(confirm('Delete this note and all its children?'))onDelete(note.id)},title:'Delete'},'×')
      )
    ),
    hasKids&&open&&h('div',{className:'tree-children'},
      note.children.map(c=>h(TreeNode,{key:c.id,note:c,depth:depth+1,activeId,onSelect,onAddChild,onDelete}))
    )
  );
}

/* ---- Export Bar ---- */
function ExportBar({book,activeNote}){
  function getPDFContent(){
    if(activeNote)return [{title:activeNote.title||'Untitled',body:activeNote.body||'',level:0}];
    return flattenNotes(book.notes||[]).map(n=>({title:n.title||'Untitled',body:n.body||'',level:n._level}));
  }
  function exportPDF(){
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF();
    let y=20;
    const heading=activeNote?activeNote.title||'Untitled':book.name;
    doc.setFontSize(20);doc.setFont('helvetica','bold');
    doc.text(heading,20,y);y+=12;
    getPDFContent().forEach(n=>{
      if(!activeNote){
        if(y>275){doc.addPage();y=20;}
        const sz=n.level===0?14:n.level===1?12:11;
        doc.setFontSize(sz);doc.setFont('helvetica','bold');
        doc.text(' '.repeat(n.level*2)+n.title,20,y);y+=sz*0.6;
      }
      if(n.body){
        doc.setFontSize(10);doc.setFont('helvetica','normal');
        const lines=doc.splitTextToSize(n.body,165-n.level*4);
        lines.forEach(l=>{if(y>280){doc.addPage();y=20;}doc.text(l,22+n.level*4,y);y+=5.5;});
        y+=3;
      }
    });
    doc.save((activeNote?activeNote.title||'note':book.name)+'.pdf');
  }
  function exportExcel(){
    const rows=getPDFContent().map(n=>({'Level':n.level,'Title':n.title,'Content':n.body}));
    const ws=XLSX.utils.json_to_sheet(rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Notes');
    XLSX.writeFile(wb,(activeNote?activeNote.title||'note':book.name)+'.xlsx');
  }
  function exportWord(){
    const name=activeNote?activeNote.title||'note':book.name;
    let html=`<html><head><meta charset="UTF-8"><style>body{font-family:Calibri,sans-serif;margin:40px;color:#1a1a1a}h1{font-size:22pt}h2{font-size:15pt}h3{font-size:13pt}h4{font-size:11pt}p{font-size:11pt;line-height:1.7;color:#374151;margin-bottom:8pt}</style></head><body>`;
    if(!activeNote)html+=`<h1>${book.emoji||'📓'} ${book.name}</h1><hr/>`;
    getPDFContent().forEach(n=>{
      const t=['h1','h2','h3','h4'][Math.min(n.level+(activeNote?0:0),3)];
      html+=`<${t}>${n.title}</${t}>`;
      if(n.body)html+=`<p>${n.body.replace(/\n/g,'<br/>')}</p>`;
    });
    html+='</body></html>';
    const blob=new Blob(['\ufeff'+html],{type:'application/msword'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'.doc';a.click();
  }
  return h('div',{className:'export-bar'},
    h('span',{className:'lbl'},'Export:'),
    h('button',{className:'btn btn-sm',onClick:exportPDF},'📄 PDF'),
    h('button',{className:'btn btn-sm',onClick:exportExcel},'📊 Excel'),
    h('button',{className:'btn btn-sm',onClick:exportWord},'📝 Word'),
  );
}

/* ---- Main App ---- */
function App(){
  const[books,setBooks]=useState(loadBooks);
  const[page,setPage]=useState('home');
  const[activeBookId,setActiveBookId]=useState(null);
  const[activeNoteId,setActiveNoteId]=useState(null);
  const[showAddBook,setShowAddBook]=useState(false);
  const[newBook,setNewBook]=useState({name:'',emoji:'📓',color:'#fef3c7'});
  const[showAddNote,setShowAddNote]=useState(false);
  const[addNoteParent,setAddNoteParent]=useState(null);
  const[newNoteTitle,setNewNoteTitle]=useState('');

  useEffect(()=>{saveBooks(books);},[books]);

  const activeBook=books.find(b=>b.id===activeBookId);
  const activeNote=activeBook&&activeNoteId?findNote(activeBook.notes||[],activeNoteId):null;

  function mutateBook(id,fn){setBooks(prev=>prev.map(b=>b.id===id?fn(b):b));}

  function openBook(id){setActiveBookId(id);setActiveNoteId(null);setPage('book');}

  function addBook(){
    if(!newBook.name.trim())return;
    const b={id:genId(),name:newBook.name.trim(),emoji:newBook.emoji,color:newBook.color,notes:[],createdAt:Date.now()};
    setBooks(prev=>[...prev,b]);
    setShowAddBook(false);setNewBook({name:'',emoji:'📓',color:'#fef3c7'});
  }

  function addNote(){
    if(!newNoteTitle.trim()||!activeBookId)return;
    const note={id:genId(),title:newNoteTitle.trim(),body:'',children:[],createdAt:Date.now()};
    mutateBook(activeBookId,b=>addNoteParent
      ?{...b,notes:addChild(b.notes||[],addNoteParent,note)}
      :{...b,notes:[...(b.notes||[]),note]}
    );
    setActiveNoteId(note.id);
    setShowAddNote(false);setNewNoteTitle('');setAddNoteParent(null);
  }

  function handleNoteChange(field,val){
    if(!activeNoteId||!activeBookId)return;
    mutateBook(activeBookId,b=>({...b,notes:updateNote(b.notes||[],activeNoteId,n=>({...n,[field]:val}))}));
  }

  function deleteNoteNode(id){
    mutateBook(activeBookId,b=>({...b,notes:deleteNoteById(b.notes||[],id)}));
    if(activeNoteId===id)setActiveNoteId(null);
  }

  const totalNotes=books.reduce((s,b)=>s+countNotes(b.notes||[]),0);

  return h('div',{className:'app'},
    /* SIDEBAR */
    h('div',{className:'sidebar'},
      h('div',{className:'sidebar-logo'},
        h('h1',null,'✦ MyNotes'),
        h('span',null,'Your knowledge base')
      ),
      h('div',{className:'sidebar-nav'},
        h('div',{className:'nav-item'+(page==='home'?' active':''),onClick:()=>setPage('home')},
          h('span',null,'⌂'),h('span',null,'Home')),
        h('div',{className:'nav-item'+(page==='books'?' active':''),onClick:()=>setPage('books')},
          h('span',null,'⊞'),h('span',null,'All Books'))
      ),
      books.length>0&&h('div',{className:'sidebar-books'},
        h('div',{className:'sidebar-section-label'},'My Books'),
        books.map(b=>h('div',{
          key:b.id,
          className:'book-nav-item'+(activeBookId===b.id&&page==='book'?' active':''),
          onClick:()=>openBook(b.id)
        },
          h('span',{style:{fontSize:'14px',width:'18px',textAlign:'center'}},b.emoji||'📓'),
          h('span',{style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:'13px'}},b.name)
        ))
      )
    ),

    /* MAIN */
    h('div',{className:'main'},
      h('div',{className:'topbar'},
        h('span',{className:'topbar-title'},
          page==='home'?'Home':
          page==='books'?'All Books':
          activeBook?`${activeBook.emoji||'📓'} ${activeBook.name}`:'Notes'
        ),
        page==='book'&&activeBook&&h('button',{
          className:'btn btn-sm btn-primary',
          onClick:()=>{setAddNoteParent(null);setShowAddNote(true)}
        },'+ New Note'),
        (page==='home'||page==='books')&&h('button',{
          className:'btn btn-sm btn-primary',onClick:()=>setShowAddBook(true)
        },'+ New Book')
      ),

      /* PAGES */
      page==='home'&&h('div',{className:'content'},
        h('div',{className:'home-welcome'},
          h('div',{style:{fontSize:'56px',marginBottom:'16px'}},'✦'),
          h('h2',null,'Welcome to MyNotes'),
          h('p',null,'Your own free, personal knowledge base. Create books, write hierarchical notes, and export to PDF, Excel, or Word.'),
          h('div',{className:'stats-row'},
            h('div',{className:'stat-card'},h('div',{className:'num'},books.length),h('div',{className:'lbl'},'Books')),
            h('div',{className:'stat-card'},h('div',{className:'num'},totalNotes),h('div',{className:'lbl'},'Total Notes'))
          ),
          h('div',{className:'info-banner'},
            h('strong',null,'📌 Note: '),'Your notes are stored in this browser\'s local storage. To access the same notes from another device, use the Export buttons to download your notes, or keep using the same browser on the same device.'
          ),
          h('button',{className:'btn btn-primary',style:{padding:'10px 24px',fontSize:'14px'},onClick:()=>setPage('books')},'Open my books →')
        )
      ),

      page==='books'&&h('div',{className:'content'},
        books.length===0&&h('div',{className:'empty-state'},
          h('div',{className:'es-icon'},'📚'),
          h('p',null,'No books yet. Create your first book to get started.')
        ),
        h('div',{className:'books-grid'},
          books.map(b=>h('div',{key:b.id,className:'book-card',onClick:()=>openBook(b.id)},
            h('div',{className:'book-actions'},
              h('button',{className:'icon-btn danger',title:'Delete book',onClick:e=>{e.stopPropagation();if(confirm('Delete "'+b.name+'" and all its notes?'))setBooks(prev=>prev.filter(x=>x.id!==b.id));}},'×')
            ),
            h('div',{className:'book-dp',style:{background:b.color||'#fef3c7'}},b.emoji||'📓'),
            h('div',{className:'book-name'},b.name),
            h('div',{className:'book-count'},countNotes(b.notes||[])+' notes')
          )),
          h('div',{className:'add-book-card',onClick:()=>setShowAddBook(true)},
            h('span',{style:{fontSize:'22px'}},'＋'),
            h('span',null,'New Book')
          )
        )
      ),

      page==='book'&&activeBook&&h('div',{className:'notes-layout'},
        /* TREE */
        h('div',{className:'notes-tree'},
          h('div',{className:'notes-tree-header'},
            h('span',null,'Notes ('+countNotes(activeBook.notes||[])+')'),
            h('button',{className:'btn btn-sm btn-primary',style:{padding:'3px 8px',fontSize:'12px'},
              onClick:()=>{setAddNoteParent(null);setShowAddNote(true)}},'+')
          ),
          h('div',{className:'notes-tree-body'},
            (activeBook.notes||[]).length===0&&h('div',{style:{padding:'20px 14px',textAlign:'center',color:'#9ca3af',fontSize:'13px',lineHeight:'1.6'}},
              'No notes yet.',h('br'),'Click + to create your first note.'
            ),
            (activeBook.notes||[]).map(n=>h(TreeNode,{
              key:n.id,note:n,depth:0,
              activeId:activeNoteId,
              onSelect:id=>setActiveNoteId(id),
              onAddChild:id=>{setAddNoteParent(id);setShowAddNote(true)},
              onDelete:deleteNoteNode
            }))
          )
        ),
        /* EDITOR */
        h('div',{className:'note-editor'},
          activeNote
            ?h(Fragment,null,
              h('div',{className:'editor-inner'},
                h('input',{
                  className:'note-title-input',
                  placeholder:'Note title...',
                  value:activeNote.title||'',
                  onChange:e=>handleNoteChange('title',e.target.value)
                }),
                h('div',{className:'note-meta'},
                  h('span',null,'Created: '+new Date(activeNote.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}))
                ),
                h('textarea',{
                  className:'note-body-input',
                  placeholder:'Start writing...\n\nYou can write anything here — ideas, summaries, thoughts, plans.',
                  value:activeNote.body||'',
                  onChange:e=>handleNoteChange('body',e.target.value),
                  rows:24
                })
              ),
              h(ExportBar,{book:activeBook,activeNote})
            )
            :h('div',{className:'empty-state'},
              h('div',{className:'es-icon'},'◦'),
              h('p',null,'Select a note from the left to start writing,\nor click + to create a new note.')
            )
        )
      )
    ),

    /* MODAL: Add Book */
    showAddBook&&h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)setShowAddBook(false)}},
      h('div',{className:'modal'},
        h('h3',null,'Create a new book'),
        h('label',null,'Book name'),
        h('input',{placeholder:'e.g. Work Notes, Personal Journal...',value:newBook.name,autoFocus:true,
          onChange:e=>setNewBook(b=>({...b,name:e.target.value})),
          onKeyDown:e=>e.key==='Enter'&&addBook()}),
        h('label',null,'Pick an emoji'),
        h('div',{className:'emoji-grid'},
          EMOJIS.map(em=>h('div',{key:em,className:'emoji-opt'+(newBook.emoji===em?' selected':''),onClick:()=>setNewBook(b=>({...b,emoji:em}))},em))
        ),
        h('label',null,'Cover colour'),
        h('div',{className:'color-grid'},
          COLORS.map(c=>h('div',{key:c,className:'color-opt'+(newBook.color===c?' selected':''),style:{background:c},onClick:()=>setNewBook(b=>({...b,color:c}))}))
        ),
        h('div',{className:'modal-footer'},
          h('button',{className:'btn',onClick:()=>{setShowAddBook(false);setNewBook({name:'',emoji:'📓',color:'#fef3c7'})}},'Cancel'),
          h('button',{className:'btn btn-primary',onClick:addBook},'Create Book')
        )
      )
    ),

    /* MODAL: Add Note */
    showAddNote&&h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)setShowAddNote(false)}},
      h('div',{className:'modal'},
        h('h3',null,addNoteParent?'Add a child note':'Add a new note'),
        h('label',null,'Note title'),
        h('input',{placeholder:'e.g. Meeting Notes, Chapter 1...',value:newNoteTitle,autoFocus:true,
          onChange:e=>setNewNoteTitle(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&addNote()}),
        h('div',{className:'modal-footer'},
          h('button',{className:'btn',onClick:()=>{setShowAddNote(false);setNewNoteTitle('');setAddNoteParent(null)}},'Cancel'),
          h('button',{className:'btn btn-primary',onClick:addNote},'Create Note')
        )
      )
    )
  );
}

ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
</html>
